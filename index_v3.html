<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 OpenClaw Monopoly - 大富翁 Web 版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 800px;
            margin: 0 auto;
        }

        .game-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .game-header h1 {
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        /* 棋盘 - 6x6 Grid */
        .game-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 3px;
            padding: 10px;
            background: #27ae60;
            aspect-ratio: 1;
        }

        .cell {
            background: #ecf0f1;
            border: 2px solid #2c3e50;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            text-align: center;
            padding: 3px;
            position: relative;
        }

        .cell.property { background: #ffeaa7; }
        .cell.start { background: #fdcb6e; }
        .cell.jail { background: #e74c3c; color: white; }
        .cell.chance { background: #9b59b6; color: white; }
        .cell.fate { background: #e67e22; color: white; }
        .cell.empty { visibility: hidden; }

        .cell-name { font-weight: bold; margin-bottom: 3px; }
        .cell-price { font-size: 9px; color: #7f8c8d; }

        .player-marker {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            background: red;
        }

        .game-controls {
            padding: 15px;
            background: #34495e;
            color: white;
        }

        .control-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .player-info {
            background: #2c3e50;
            padding: 12px;
            border-radius: 8px;
        }

        .player-info h3 {
            margin-bottom: 8px;
            color: #f39c12;
        }

        .dice-area {
            text-align: center;
        }

        .dice-display {
            font-size: 3em;
            margin: 10px 0;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .message-log {
            background: #2c3e50;
            padding: 12px;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 12px;
            margin-top: 10px;
        }

        .message-log p {
            margin: 4px 0;
            padding: 4px;
            background: #34495e;
            border-radius: 4px;
        }

        .start-screen {
            text-align: center;
            padding: 40px 15px;
        }

        .player-input {
            margin: 8px 0;
        }

        .player-input input {
            padding: 8px 15px;
            font-size: 14px;
            border: 2px solid #667eea;
            border-radius: 5px;
            width: 180px;
        }

        @media (max-width: 768px) {
            .control-panel { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div id="startScreen" class="start-screen">
            <h2>🎲 大富翁 Web 版</h2>
            <div class="player-setup">
                <h3>选择玩家数量</h3>
                <div style="margin: 15px 0;">
                    <button class="btn" onclick="setPlayers(2)">2 人</button>
                    <button class="btn" onclick="setPlayers(3)">3 人</button>
                    <button class="btn" onclick="setPlayers(4)">4 人</button>
                </div>
                <div id="playerInputs"></div>
            </div>
            <button id="startBtn" class="btn" onclick="startGame()" style="display: none;">🚀 开始游戏</button>
        </div>

        <div id="gameScreen" style="display: none;">
            <div class="game-header">
                <h1>🎲 OpenClaw Monopoly</h1>
                <p>大富翁 Web 版 - 棋盘修复</p>
            </div>
            <div class="game-board" id="gameBoard"></div>
            <div class="game-controls">
                <div class="control-panel">
                    <div class="player-info">
                        <h3 id="currentPlayerName">玩家 1</h3>
                        <p>💰 <span id="currentMoney">15000</span>元</p>
                        <p>📍 <span id="currentPosition">起点</span></p>
                        <p>🏠 <span id="currentProperties">0</span>处</p>
                    </div>
                    <div class="dice-area">
                        <div class="dice-display" id="diceDisplay">🎲 🎲</div>
                        <button id="rollBtn" class="btn" onclick="rollDice()">掷骰子</button>
                        <button id="buyBtn" class="btn" onclick="buyProperty()" style="display:none;background:#27ae60;">购买</button>
                        <button id="endBtn" class="btn" onclick="endTurn()" style="display:none;background:#e74c3c;">结束</button>
                    </div>
                </div>
                <div class="message-log" id="messageLog">
                    <p>🎮 游戏开始！</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BOARD_SIZE = 20;
        const START_MONEY = 15000;
        
        const PROPERTIES = {
            1: { name: "北京路", price: 1200, rent: 120 },
            3: { name: "上海街", price: 2000, rent: 200 },
            5: { name: "广州大道", price: 2400, rent: 240 },
            6: { name: "深圳路", price: 2800, rent: 280 },
            8: { name: "杭州街", price: 3200, rent: 320 },
            9: { name: "成都路", price: 3600, rent: 360 },
            11: { name: "武汉大道", price: 4000, rent: 400 },
            13: { name: "南京路", price: 4400, rent: 440 },
            14: { name: "西安街", price: 4800, rent: 480 },
            16: { name: "重庆路", price: 5200, rent: 520 },
            18: { name: "天津大道", price: 5600, rent: 560 },
            19: { name: "苏州街", price: 6000, rent: 600 }
        };

        let players = [];
        let currentPlayerIndex = 0;
        let boardOwners = {};
        let gameOver = false;

        function setPlayers(count) {
            const container = document.getElementById('playerInputs');
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const div = document.createElement('div');
                div.className = 'player-input';
                div.innerHTML = `<input type="text" id="player${i}Name" placeholder="玩家${i+1}" value="玩家${i+1}">`;
                container.appendChild(div);
            }
            document.getElementById('startBtn').style.display = 'inline-block';
        }

        function startGame() {
            const inputs = document.querySelectorAll('#playerInputs input');
            const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12'];
            players = [];
            inputs.forEach((input, i) => {
                players.push({
                    name: input.value || `玩家${i+1}`,
                    color: colors[i],
                    money: START_MONEY,
                    position: 0,
                    properties: [],
                    bankrupt: false
                });
            });
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            createBoard();
            updatePlayerDisplay();
            addMessage(`🎮 游戏开始！${players.length}位玩家`);
        }

        function createBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            
            // 6x6 Grid = 36 个位置
            // 外圈 20 个格子 + 中间 16 个空白
            const cellTypes = [
                // 第 1 行（顶边，从左到右）：15-14-13-12-11-10
                'cell15', 'cell14', 'cell13', 'cell12', 'cell11', 'cell10',
                // 第 2 行：16-空 - 空 - 空 - 空 -9
                'cell16', 'empty', 'empty', 'empty', 'empty', 'cell9',
                // 第 3 行：17-空 - 空 - 空 - 空 -8
                'cell17', 'empty', 'empty', 'empty', 'empty', 'cell8',
                // 第 4 行：18-空 - 空 - 空 - 空 -7
                'cell18', 'empty', 'empty', 'empty', 'empty', 'cell7',
                // 第 5 行：19-空 - 空 - 空 - 空 -6
                'cell19', 'empty', 'empty', 'empty', 'empty', 'cell6',
                // 第 6 行（底边，从左到右）：0-1-2-3-4-5
                'cell0', 'cell1', 'cell2', 'cell3', 'cell4', 'cell5'
            ];

            for (let i = 0; i < 36; i++) {
                const cellId = cellTypes[i];
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                if (cellId === 'empty') {
                    cell.classList.add('empty');
                    board.appendChild(cell);
                    continue;
                }

                const index = parseInt(cellId.replace('cell', ''));
                cell.id = `cell${index}`;

                if (index === 0) {
                    cell.classList.add('start');
                    cell.innerHTML = '<div class="cell-name">起点</div>';
                } else if (index === 10) {
                    cell.classList.add('jail');
                    cell.innerHTML = '<div class="cell-name">监狱</div>';
                } else if (index === 15) {
                    cell.classList.add('fate');
                    cell.innerHTML = '<div class="cell-name">免费停车</div>';
                } else if ([2, 17].includes(index)) {
                    cell.classList.add('chance');
                    cell.innerHTML = '<div class="cell-name">机会</div>';
                } else if ([7, 12].includes(index)) {
                    cell.classList.add('fate');
                    cell.innerHTML = '<div class="cell-name">命运</div>';
                } else if (PROPERTIES[index]) {
                    cell.classList.add('property');
                    cell.innerHTML = `
                        <div class="cell-name">${PROPERTIES[index].name}</div>
                        <div class="cell-price">¥${PROPERTIES[index].price}</div>
                    `;
                }

                board.appendChild(cell);
            }

            updatePlayerMarkers();
        }

        function updatePlayerMarkers() {
            document.querySelectorAll('.player-marker').forEach(el => el.remove());
            players.forEach((player, i) => {
                if (player.bankrupt) return;
                const cell = document.getElementById(`cell${player.position}`);
                if (cell) {
                    const marker = document.createElement('div');
                    marker.className = 'player-marker';
                    marker.style.background = player.color;
                    marker.style.left = `${5 + i * 20}px`;
                    marker.style.bottom = '5px';
                    marker.title = player.name;
                    cell.appendChild(marker);
                }
            });
        }

        function rollDice() {
            const dice1 = Math.floor(Math.random() * 6) + 1;
            const dice2 = Math.floor(Math.random() * 6) + 1;
            const total = dice1 + dice2;
            const symbols = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            document.getElementById('diceDisplay').textContent = `${symbols[dice1-1]} ${symbols[dice2-1]}`;
            addMessage(`🎲 ${players[currentPlayerIndex].name} 掷出 ${dice1}+${dice2}=${total}`);
            movePlayer(total);
            document.getElementById('rollBtn').disabled = true;
        }

        function movePlayer(steps) {
            const player = players[currentPlayerIndex];
            const oldPos = player.position;
            player.position = (player.position + steps) % BOARD_SIZE;
            if (player.position < oldPos) {
                player.money += 2000;
                addMessage(`✅ 经过起点，获得 2000 元！`);
            }
            updatePlayerMarkers();
            updatePlayerDisplay();
            setTimeout(checkPosition, 500);
        }

        function checkPosition() {
            const player = players[currentPlayerIndex];
            const pos = player.position;
            
            if (pos === 0) {
                addMessage(`📍 起点`);
            } else if (PROPERTIES[pos]) {
                const prop = PROPERTIES[pos];
                if (!(pos in boardOwners)) {
                    addMessage(`🏠 ${prop.name} - 可购买（${prop.price}元）`);
                    if (player.money >= prop.price) {
                        document.getElementById('buyBtn').style.display = 'inline-block';
                    }
                } else if (boardOwners[pos] === currentPlayerIndex) {
                    addMessage(`✅ 这是你的地产`);
                } else {
                    const rent = prop.rent;
                    addMessage(`💸 踩到${players[boardOwners[pos]].name}的${prop.name}，付租金${rent}元`);
                    if (player.money >= rent) {
                        player.money -= rent;
                        players[boardOwners[pos]].money += rent;
                    } else {
                        player.bankrupt = true;
                        addMessage(`💀 ${player.name}破产了！`);
                    }
                }
            } else if ([2, 17].includes(pos)) {
                addMessage(`🎴 机会卡`);
            } else if ([7, 12].includes(pos)) {
                addMessage(`🎴 命运卡`);
            }
            
            updatePlayerDisplay();
            document.getElementById('endBtn').style.display = 'inline-block';
        }

        function buyProperty() {
            const player = players[currentPlayerIndex];
            const pos = player.position;
            if (PROPERTIES[pos] && !(pos in boardOwners)) {
                const prop = PROPERTIES[pos];
                if (player.money >= prop.price) {
                    player.money -= prop.price;
                    player.properties.push(pos);
                    boardOwners[pos] = currentPlayerIndex;
                    addMessage(`✅ 购买了${prop.name}`);
                    document.getElementById('buyBtn').style.display = 'none';
                    updatePlayerDisplay();
                }
            }
        }

        function endTurn() {
            document.getElementById('buyBtn').style.display = 'none';
            document.getElementById('endBtn').style.display = 'none';
            document.getElementById('rollBtn').disabled = false;
            do {
                currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
            } while (players[currentPlayerIndex].bankrupt);
            updatePlayerDisplay();
            addMessage(`\n🎯 轮到${players[currentPlayerIndex].name}`);
        }

        function updatePlayerDisplay() {
            const player = players[currentPlayerIndex];
            document.getElementById('currentPlayerName').textContent = player.name;
            document.getElementById('currentPlayerName').style.color = player.color;
            document.getElementById('currentMoney').textContent = player.money;
            const names = ['起点','北京路','机会','上海街','广州大道','深圳路','武汉大道','命运','杭州街','成都路','监狱','南京路','命运','西安街','重庆路','免费停车','天津大道','机会','苏州街'];
            document.getElementById('currentPosition').textContent = names[player.position] || `位置${player.position}`;
            document.getElementById('currentProperties').textContent = player.properties.length;
        }

        function addMessage(text) {
            const log = document.getElementById('messageLog');
            const p = document.createElement('p');
            p.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            log.appendChild(p);
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
