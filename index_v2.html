<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 OpenClaw Monopoly - 大富翁 Web 版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .game-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 1000px;
        }

        .game-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .game-header h1 {
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        .game-header p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        /* 响应式棋盘 */
        .game-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 3px;
            padding: 10px;
            background: #27ae60;
        }

        .cell {
            aspect-ratio: 1;
            background: #ecf0f1;
            border: 2px solid #2c3e50;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            text-align: center;
            padding: 3px;
            position: relative;
            transition: all 0.3s;
            min-height: 60px;
        }

        .cell:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        .cell.property {
            background: #ffeaa7;
        }

        .cell.start {
            background: #fdcb6e;
        }

        .cell.jail {
            background: #e74c3c;
            color: white;
        }

        .cell.chance {
            background: #9b59b6;
            color: white;
        }

        .cell.fate {
            background: #e67e22;
            color: white;
        }

        .cell-name {
            font-weight: bold;
            margin-bottom: 3px;
            line-height: 1.2;
        }

        .cell-price {
            font-size: 9px;
            color: #7f8c8d;
        }

        /* 玩家标记 - 动态定位 */
        .player-marker {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* 游戏控制区 */
        .game-controls {
            padding: 15px;
            background: #34495e;
            color: white;
        }

        .control-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .player-info {
            background: #2c3e50;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
        }

        .player-info h3 {
            margin-bottom: 8px;
            color: #f39c12;
            font-size: 1.1em;
        }

        .player-info p {
            margin: 4px 0;
        }

        .dice-area {
            text-align: center;
            padding: 10px;
        }

        .dice-display {
            font-size: 3em;
            margin: 10px 0;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message-log {
            background: #2c3e50;
            padding: 12px;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.5;
            margin-top: 10px;
        }

        .message-log p {
            margin: 4px 0;
            padding: 4px;
            background: #34495e;
            border-radius: 4px;
        }

        /* 开始界面 */
        .start-screen {
            text-align: center;
            padding: 40px 15px;
        }

        .start-screen h2 {
            font-size: 2em;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .player-setup {
            margin: 20px 0;
        }

        .player-input {
            margin: 8px 0;
        }

        .player-input input {
            padding: 8px 15px;
            font-size: 14px;
            border: 2px solid #667eea;
            border-radius: 5px;
            width: 180px;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .game-board {
                grid-template-columns: repeat(4, 1fr);
                gap: 2px;
                padding: 5px;
            }

            .cell {
                min-height: 50px;
                font-size: 9px;
            }

            .cell-name {
                font-size: 8px;
            }

            .cell-price {
                font-size: 8px;
            }

            .control-panel {
                grid-template-columns: 1fr;
            }

            .game-header h1 {
                font-size: 1.2em;
            }

            .dice-display {
                font-size: 2.5em;
            }

            .btn {
                padding: 10px 20px;
                font-size: 0.9em;
            }
        }

        /* 平板适配 */
        @media (min-width: 769px) and (max-width: 1024px) {
            .game-board {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        /* 超大屏幕适配 */
        @media (min-width: 1200px) {
            .cell {
                min-height: 80px;
                font-size: 12px;
            }

            .cell-name {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 开始界面 -->
        <div id="startScreen" class="start-screen">
            <h2>🎲 大富翁 Web 版</h2>
            <p style="color: #7f8c8d; margin-bottom: 20px;">OpenClaw Monopoly - 响应式优化版！</p>
            
            <div class="player-setup">
                <h3 style="margin-bottom: 15px;">选择玩家数量</h3>
                <div style="margin: 15px 0;">
                    <button class="btn" onclick="setPlayers(2)">2 人</button>
                    <button class="btn" onclick="setPlayers(3)">3 人</button>
                    <button class="btn" onclick="setPlayers(4)">4 人</button>
                </div>
                
                <div id="playerInputs"></div>
            </div>
            
            <button id="startBtn" class="btn" onclick="startGame()" style="display: none; margin-top: 20px;">
                🚀 开始游戏
            </button>
        </div>

        <!-- 游戏界面 -->
        <div id="gameScreen" style="display: none;">
            <div class="game-header">
                <h1>🎲 OpenClaw Monopoly</h1>
                <p>大富翁 Web 版 v2.0 - 响应式优化</p>
            </div>

            <div class="game-board" id="gameBoard"></div>

            <div class="game-controls">
                <div class="control-panel">
                    <div class="player-info">
                        <h3 id="currentPlayerName">玩家 1</h3>
                        <p>💰 资金：<span id="currentMoney">15000</span> 元</p>
                        <p>📍 位置：<span id="currentPosition">起点</span></p>
                        <p>🏠 地产：<span id="currentProperties">0</span> 处</p>
                    </div>

                    <div class="dice-area">
                        <div class="dice-display" id="diceDisplay">🎲 🎲</div>
                        <div>
                            <button id="rollBtn" class="btn" onclick="rollDice()">掷骰子</button>
                            <button id="buyBtn" class="btn" onclick="buyProperty()" style="display: none; background: #27ae60;">购买地产</button>
                            <button id="endBtn" class="btn" onclick="endTurn()" style="display: none; background: #e74c3c;">结束回合</button>
                        </div>
                    </div>
                </div>

                <div class="message-log" id="messageLog" style="margin-top: 10px;">
                    <p>🎮 游戏开始！欢迎来到大富翁 Web 版！</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 游戏配置
        const BOARD_SIZE = 20;
        const START_MONEY = 15000;
        
        // 地产配置
        const PROPERTIES = {
            1: { name: "北京路", price: 1200, rent: 120, color: "#ffeaa7" },
            3: { name: "上海街", price: 2000, rent: 200, color: "#ffeaa7" },
            5: { name: "广州大道", price: 2400, rent: 240, color: "#ffeaa7" },
            6: { name: "深圳路", price: 2800, rent: 280, color: "#ffeaa7" },
            8: { name: "杭州街", price: 3200, rent: 320, color: "#ffeaa7" },
            9: { name: "成都路", price: 3600, rent: 360, color: "#ffeaa7" },
            11: { name: "武汉大道", price: 4000, rent: 400, color: "#ffeaa7" },
            13: { name: "南京路", price: 4400, rent: 440, color: "#ffeaa7" },
            14: { name: "西安街", price: 4800, rent: 480, color: "#ffeaa7" },
            16: { name: "重庆路", price: 5200, rent: 520, color: "#ffeaa7" },
            18: { name: "天津大道", price: 5600, rent: 560, color: "#ffeaa7" },
            19: { name: "苏州街", price: 6000, rent: 600, color: "#ffeaa7" }
        };

        // 游戏状态
        let players = [];
        let currentPlayerIndex = 0;
        let boardOwners = {};
        let gameOver = false;

        // 设置玩家数量
        function setPlayers(count) {
            const container = document.getElementById('playerInputs');
            container.innerHTML = '';
            
            for (let i = 0; i < count; i++) {
                const div = document.createElement('div');
                div.className = 'player-input';
                div.innerHTML = `
                    <input type="text" id="player${i}Name" placeholder="玩家${i+1}名称" value="玩家${i+1}">
                `;
                container.appendChild(div);
            }
            
            document.getElementById('startBtn').style.display = 'inline-block';
        }

        // 开始游戏
        function startGame() {
            const playerInputs = document.querySelectorAll('#playerInputs input');
            players = [];
            
            const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12'];
            
            playerInputs.forEach((input, index) => {
                players.push({
                    name: input.value || `玩家${index+1}`,
                    color: colors[index],
                    money: START_MONEY,
                    position: 0,
                    properties: [],
                    bankrupt: false
                });
            });
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            
            createBoard();
            updatePlayerDisplay();
            addMessage(`🎮 游戏开始！${players.length}位玩家准备就绪！`);
        }

        // 创建棋盘
        function createBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell${i}`;
                
                let cellClass = '';
                let cellName = '';
                let cellPrice = '';
                
                if (i === 0) {
                    cellClass = 'start';
                    cellName = '起点';
                } else if (i === 10) {
                    cellClass = 'jail';
                    cellName = '监狱';
                } else if (i === 15) {
                    cellClass = 'fate';
                    cellName = '免费停车';
                } else if ([2, 17].includes(i)) {
                    cellClass = 'chance';
                    cellName = '机会';
                } else if ([7, 12].includes(i)) {
                    cellClass = 'fate';
                    cellName = '命运';
                } else if (PROPERTIES[i]) {
                    cellClass = 'property';
                    cellName = PROPERTIES[i].name;
                    cellPrice = `¥${PROPERTIES[i].price}`;
                    cell.style.background = PROPERTIES[i].color;
                }
                
                cell.classList.add(cellClass);
                cell.innerHTML = `
                    <div class="cell-name">${cellName}</div>
                    ${cellPrice ? `<div class="cell-price">${cellPrice}</div>` : ''}
                `;
                
                board.appendChild(cell);
            }
            
            updatePlayerMarkers();
        }

        // 更新玩家标记 - 动态定位避免重叠
        function updatePlayerMarkers() {
            // 清除旧标记
            document.querySelectorAll('.player-marker').forEach(el => el.remove());
            
            players.forEach((player, index) => {
                if (player.bankrupt) return;
                
                const cell = document.getElementById(`cell${player.position}`);
                if (cell) {
                    const marker = document.createElement('div');
                    marker.className = 'player-marker';
                    marker.style.background = player.color;
                    
                    // 动态计算位置，避免重叠
                    const cellSize = cell.offsetWidth;
                    const markerSize = 16;
                    const padding = 5;
                    
                    // 根据玩家数量计算位置
                    const activePlayers = players.filter(p => !p.bankrupt && p.position === player.position).length;
                    
                    if (activePlayers === 1) {
                        // 单个玩家：居中
                        marker.style.left = `${(cellSize - markerSize) / 2}px`;
                        marker.style.bottom = `${padding}px`;
                    } else {
                        // 多个玩家：分散排列
                        const positions = [
                            { left: padding, bottom: padding },
                            { left: cellSize - markerSize - padding, bottom: padding },
                            { left: padding, bottom: cellSize - markerSize - padding },
                            { left: cellSize - markerSize - padding, bottom: cellSize - markerSize - padding }
                        ];
                        
                        const playerIndexInCell = players.findIndex(p => p === player);
                        const pos = positions[playerIndexInCell % positions.length];
                        
                        marker.style.left = `${pos.left}px`;
                        marker.style.bottom = `${pos.bottom}px`;
                    }
                    
                    marker.title = player.name;
                    cell.appendChild(marker);
                }
            });
        }

        // 掷骰子
        function rollDice() {
            const dice1 = Math.floor(Math.random() * 6) + 1;
            const dice2 = Math.floor(Math.random() * 6) + 1;
            const total = dice1 + dice2;
            
            const diceSymbols = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            document.getElementById('diceDisplay').textContent = `${diceSymbols[dice1-1]} ${diceSymbols[dice2-1]}`;
            
            addMessage(`🎲 ${players[currentPlayerIndex].name} 掷出 ${dice1} + ${dice2} = ${total}`);
            
            movePlayer(total);
            
            document.getElementById('rollBtn').disabled = true;
        }

        // 移动玩家
        function movePlayer(steps) {
            const player = players[currentPlayerIndex];
            const oldPos = player.position;
            player.position = (player.position + steps) % BOARD_SIZE;
            
            // 经过起点
            if (player.position < oldPos) {
                player.money += 2000;
                addMessage(`✅ 经过起点，获得 2000 元！`);
            }
            
            updatePlayerMarkers();
            updatePlayerDisplay();
            
            // 检查位置
            setTimeout(() => checkPosition(), 500);
        }

        // 检查位置
        function checkPosition() {
            const player = players[currentPlayerIndex];
            const pos = player.position;
            
            if (pos === 0) {
                addMessage(`📍 起点`);
                document.getElementById('endBtn').style.display = 'inline-block';
            } else if (PROPERTIES[pos]) {
                const prop = PROPERTIES[pos];
                
                if (!(pos in boardOwners)) {
                    // 无主地产
                    addMessage(`🏠 ${prop.name} - 可购买（${prop.price}元）`);
                    if (player.money >= prop.price) {
                        document.getElementById('buyBtn').style.display = 'inline-block';
                    }
                    document.getElementById('endBtn').style.display = 'inline-block';
                } else if (boardOwners[pos] === currentPlayerIndex) {
                    addMessage(`✅ 这是你的地产`);
                    document.getElementById('endBtn').style.display = 'inline-block';
                } else {
                    // 别人的地产
                    const rent = prop.rent;
                    addMessage(`💸 踩到${players[boardOwners[pos]].name}的${prop.name}，需付租金${rent}元`);
                    payRent(rent, boardOwners[pos]);
                }
            } else if ([2, 17].includes(pos)) {
                drawCard('chance');
            } else if ([7, 12].includes(pos)) {
                drawCard('fate');
            } else {
                document.getElementById('endBtn').style.display = 'inline-block';
            }
        }

        // 购买地产
        function buyProperty() {
            const player = players[currentPlayerIndex];
            const pos = player.position;
            
            if (PROPERTIES[pos] && !(pos in boardOwners)) {
                const prop = PROPERTIES[pos];
                if (player.money >= prop.price) {
                    player.money -= prop.price;
                    player.properties.push(pos);
                    boardOwners[pos] = currentPlayerIndex;
                    
                    addMessage(`✅ 购买了${prop.name}（${prop.price}元）`);
                    document.getElementById('buyBtn').style.display = 'none';
                    updatePlayerDisplay();
                    updatePlayerMarkers();
                }
            }
        }

        // 支付租金
        function payRent(rent, ownerIndex) {
            const player = players[currentPlayerIndex];
            const owner = players[ownerIndex];
            
            if (player.money >= rent) {
                player.money -= rent;
                owner.money += rent;
                addMessage(`💸 支付租金${rent}元给${owner.name}`);
            } else {
                player.bankrupt = true;
                addMessage(`💀 ${player.name}破产了！`);
                checkGameOver();
            }
            
            updatePlayerDisplay();
            document.getElementById('endBtn').style.display = 'inline-block';
        }

        // 抽卡
        function drawCard(type) {
            const cards = [
                { text: "恭喜发财！获得奖金 2000 元", money: 2000 },
                { text: "投资收益！获得奖金 1500 元", money: 1500 },
                { text: "医疗费用！支付 1000 元", money: -1000 },
                { text: "交通罚款！支付 500 元", money: -500 }
            ];
            
            const card = cards[Math.floor(Math.random() * cards.length)];
            const player = players[currentPlayerIndex];
            
            addMessage(`🎴 ${card.text}`);
            player.money += card.money;
            
            if (player.money < 0) {
                player.bankrupt = true;
                addMessage(`💀 ${player.name}破产了！`);
                checkGameOver();
            }
            
            updatePlayerDisplay();
            document.getElementById('endBtn').style.display = 'inline-block';
        }

        // 结束回合
        function endTurn() {
            document.getElementById('buyBtn').style.display = 'none';
            document.getElementById('endBtn').style.display = 'none';
            document.getElementById('rollBtn').disabled = false;
            
            // 下一个玩家
            do {
                currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
            } while (players[currentPlayerIndex].bankrupt);
            
            updatePlayerDisplay();
            addMessage(`\n🎯 轮到${players[currentPlayerIndex].name}`);
        }

        // 更新玩家显示
        function updatePlayerDisplay() {
            const player = players[currentPlayerIndex];
            document.getElementById('currentPlayerName').textContent = player.name;
            document.getElementById('currentPlayerName').style.color = player.color;
            document.getElementById('currentMoney').textContent = player.money;
            document.getElementById('currentPosition').textContent = getCellName(player.position);
            document.getElementById('currentProperties').textContent = player.properties.length;
        }

        // 获取格子名称
        function getCellName(pos) {
            if (pos === 0) return "起点";
            if (pos === 10) return "监狱";
            if (pos === 15) return "免费停车";
            if ([2, 17].includes(pos)) return "机会";
            if ([7, 12].includes(pos)) return "命运";
            if (PROPERTIES[pos]) return PROPERTIES[pos].name;
            return `位置${pos}`;
        }

        // 添加消息
        function addMessage(text) {
            const log = document.getElementById('messageLog');
            const p = document.createElement('p');
            p.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            log.appendChild(p);
            log.scrollTop = log.scrollHeight;
        }

        // 检查游戏结束
        function checkGameOver() {
            const activePlayers = players.filter(p => !p.bankrupt);
            if (activePlayers.length === 1) {
                gameOver = true;
                addMessage(`\n🎉🎉🎉 ${activePlayers[0].name}获胜！🎉🎉🎉`);
                alert(`🎉 恭喜${activePlayers[0].name}获胜！`);
            }
        }

        // 窗口大小变化时重新计算玩家标记位置
        window.addEventListener('resize', () => {
            updatePlayerMarkers();
        });
    </script>
</body>
</html>
