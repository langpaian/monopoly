<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 OpenClaw Monopoly - 大富翁 Web 版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 1400px;
            margin: 0 auto;
        }

        .game-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .game-header h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .game-header p {
            font-size: 1em;
            opacity: 0.9;
        }

        /* 游戏主区域 - 横向布局 */
        .game-main {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            padding: 20px;
            background: #f5f5f5;
        }

        /* 棋盘区域 */
        .board-area {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 4px;
            padding: 10px;
            background: #27ae60;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            /* 动态尺寸：最大 800px，最小 400px */
            width: min(800px, 90vw);
            height: min(800px, 90vw);
        }

        .cell {
            background: #ecf0f1;
            border: 2px solid #2c3e50;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 13px;
            text-align: center;
            padding: 5px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }

        .cell:hover {
            transform: scale(1.05);
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .cell.property { background: #ffeaa7; }
        .cell.start { background: #fdcb6e; }
        .cell.jail { background: #e74c3c; color: white; }
        .cell.chance { background: #9b59b6; color: white; }
        .cell.fate { background: #e67e22; color: white; }
        .cell.empty { visibility: hidden; }

        .cell-name {
            font-weight: bold;
            margin-bottom: 3px;
            font-size: 12px;
        }

        .cell-price {
            font-size: 11px;
            color: #7f8c8d;
        }

        /* 玩家标记 - 增大尺寸 */
        .player-marker {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 3px solid white;
            position: absolute;
            transition: all 0.3s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            z-index: 5;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 控制面板 */
        .control-panel {
            background: #34495e;
            color: white;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .player-info {
            background: #2c3e50;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #f39c12;
        }

        .player-info h3 {
            margin-bottom: 15px;
            color: #f39c12;
            font-size: 1.3em;
        }

        .player-info p {
            margin: 8px 0;
            font-size: 14px;
        }

        .dice-section {
            background: #2c3e50;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .dice-display {
            font-size: 4em;
            margin: 15px 0;
            min-height: 80px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-buy { background: #27ae60; }
        .btn-end { background: #e74c3c; }

        .message-log {
            background: #2c3e50;
            padding: 15px;
            border-radius: 10px;
            flex: 1;
            min-height: 200px;
            max-height: 300px;
            overflow-y: auto;
        }

        .message-log h4 {
            margin-bottom: 10px;
            color: #f39c12;
        }

        .message-log p {
            margin: 6px 0;
            padding: 6px;
            background: #34495e;
            border-radius: 5px;
            font-size: 13px;
            line-height: 1.5;
        }

        /* 开始界面 */
        .start-screen {
            text-align: center;
            padding: 60px 20px;
        }

        .start-screen h2 {
            font-size: 2.5em;
            margin-bottom: 30px;
            color: #2c3e50;
        }

        .player-setup {
            margin: 30px 0;
        }

        .player-input {
            margin: 10px 0;
        }

        .player-input input {
            padding: 10px 20px;
            font-size: 14px;
            border: 2px solid #667eea;
            border-radius: 5px;
            width: 200px;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .game-main {
                grid-template-columns: 1fr;
            }

            .game-board {
                width: min(600px, 90vw);
                height: min(600px, 90vw);
            }

            .cell {
                font-size: 11px;
            }

            .player-marker {
                width: 25px;
                height: 25px;
                font-size: 14px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .game-board {
                width: min(400px, 90vw);
                height: min(400px, 90vw);
            }

            .cell {
                font-size: 10px;
                padding: 3px;
            }

            .cell-name {
                font-size: 9px;
            }

            .player-marker {
                width: 20px;
                height: 20px;
                font-size: 12px;
            }

            .game-header h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 开始界面 -->
        <div id="startScreen" class="start-screen">
            <h2>🎲 大富翁 Web 版</h2>
            <p style="color: #7f8c8d; margin-bottom: 30px;">OpenClaw Monopoly - 横向布局优化版！</p>
            
            <div class="player-setup">
                <h3 style="margin-bottom: 15px;">选择玩家数量</h3>
                <div style="margin: 15px 0;">
                    <button class="btn" onclick="setPlayers(2)">2 人</button>
                    <button class="btn" onclick="setPlayers(3)">3 人</button>
                    <button class="btn" onclick="setPlayers(4)">4 人</button>
                </div>
                
                <div id="playerInputs"></div>
            </div>
            
            <button id="startBtn" class="btn" onclick="startGame()" style="display: none; margin-top: 20px;">
                🚀 开始游戏
            </button>
        </div>

        <!-- 游戏界面 -->
        <div id="gameScreen" style="display: none;">
            <div class="game-header">
                <h1>🎲 OpenClaw Monopoly</h1>
                <p>大富翁 Web 版 v4.0 - 横向布局 + 大玩家标记</p>
            </div>

            <div class="game-main">
                <!-- 左侧：棋盘 -->
                <div class="board-area">
                    <div class="game-board" id="gameBoard"></div>
                </div>

                <!-- 右侧：控制面板 -->
                <div class="control-panel">
                    <!-- 玩家信息 -->
                    <div class="player-info">
                        <h3 id="currentPlayerName">玩家 1</h3>
                        <p>💰 资金：<span id="currentMoney">15000</span> 元</p>
                        <p>📍 位置：<span id="currentPosition">起点</span></p>
                        <p>🏠 地产：<span id="currentProperties">0</span> 处</p>
                    </div>

                    <!-- 骰子区域 -->
                    <div class="dice-section">
                        <div class="dice-display" id="diceDisplay">🎲 🎲</div>
                        <div>
                            <button id="rollBtn" class="btn" onclick="rollDice()">掷骰子</button>
                            <button id="buyBtn" class="btn btn-buy" onclick="buyProperty()" style="display: none;">购买地产</button>
                            <button id="endBtn" class="btn btn-end" onclick="endTurn()" style="display: none;">结束回合</button>
                        </div>
                    </div>

                    <!-- 消息日志 -->
                    <div class="message-log">
                        <h4>📝 游戏日志</h4>
                        <div id="messageLog">
                            <p>🎮 游戏开始！欢迎来到大富翁 Web 版！</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BOARD_SIZE = 20;
        const START_MONEY = 15000;
        
        const PROPERTIES = {
            1: { name: "北京路", price: 1200, rent: 120 },
            3: { name: "上海街", price: 2000, rent: 200 },
            5: { name: "广州大道", price: 2400, rent: 240 },
            6: { name: "深圳路", price: 2800, rent: 280 },
            8: { name: "杭州街", price: 3200, rent: 320 },
            9: { name: "成都路", price: 3600, rent: 360 },
            11: { name: "武汉大道", price: 4000, rent: 400 },
            13: { name: "南京路", price: 4400, rent: 440 },
            14: { name: "西安街", price: 4800, rent: 480 },
            16: { name: "重庆路", price: 5200, rent: 520 },
            18: { name: "天津大道", price: 5600, rent: 560 },
            19: { name: "苏州街", price: 6000, rent: 600 }
        };

        let players = [];
        let currentPlayerIndex = 0;
        let boardOwners = {};
        let gameOver = false;

        function setPlayers(count) {
            const container = document.getElementById('playerInputs');
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const div = document.createElement('div');
                div.className = 'player-input';
                div.innerHTML = `<input type="text" id="player${i}Name" placeholder="玩家${i+1}名称" value="玩家${i+1}">`;
                container.appendChild(div);
            }
            document.getElementById('startBtn').style.display = 'inline-block';
        }

        function startGame() {
            const inputs = document.querySelectorAll('#playerInputs input');
            const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12'];
            const emojis = ['🔴', '🔵', '🟢', '🟡'];
            players = [];
            inputs.forEach((input, i) => {
                players.push({
                    name: input.value || `玩家${i+1}`,
                    color: colors[i],
                    emoji: emojis[i],
                    money: START_MONEY,
                    position: 0,
                    properties: [],
                    bankrupt: false
                });
            });
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            createBoard();
            updatePlayerDisplay();
            addMessage(`🎮 游戏开始！${players.length}位玩家准备就绪！`);
        }

        function createBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            
            const layout = [
                // 第 1 行（顶边，从左到右）
                { type: 'fate', name: '免费停车' },
                { type: 'property', name: '西安街', price: 4800 },
                { type: 'fate', name: '命运' },
                { type: 'property', name: '南京路', price: 4400 },
                { type: 'property', name: '武汉大道', price: 4000 },
                { type: 'jail', name: '监狱' },
                // 第 2 行
                { type: 'property', name: '天津大道', price: 5600 },
                { type: 'empty' }, { type: 'empty' }, { type: 'empty' }, { type: 'empty' },
                { type: 'property', name: '成都路', price: 3600 },
                // 第 3 行
                { type: 'chance', name: '机会' },
                { type: 'empty' }, { type: 'empty' }, { type: 'empty' }, { type: 'empty' },
                { type: 'fate', name: '命运' },
                // 第 4 行
                { type: 'property', name: '苏州街', price: 6000 },
                { type: 'empty' }, { type: 'empty' }, { type: 'empty' }, { type: 'empty' },
                { type: 'property', name: '杭州街', price: 3200 },
                // 第 5 行
                { type: 'empty' },
                { type: 'empty' }, { type: 'empty' }, { type: 'empty' }, { type: 'empty' },
                { type: 'property', name: '深圳路', price: 2800 },
                // 第 6 行（底边，从左到右）
                { type: 'start', name: '起点' },
                { type: 'property', name: '北京路', price: 1200 },
                { type: 'chance', name: '机会' },
                { type: 'property', name: '上海街', price: 2000 },
                { type: 'property', name: '广州大道', price: 2400 },
                { type: 'property', name: '重庆路', price: 5200 }
            ];

            for (let i = 0; i < 36; i++) {
                const item = layout[i];
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                if (item.type === 'empty') {
                    cell.classList.add('empty');
                } else {
                    cell.classList.add(item.type);
                    cell.innerHTML = `
                        <div class="cell-name">${item.name}</div>
                        ${item.price ? `<div class="cell-price">¥${item.price}</div>` : ''}
                    `;
                }
                
                board.appendChild(cell);
            }

            updatePlayerMarkers();
        }

        function updatePlayerMarkers() {
            document.querySelectorAll('.player-marker').forEach(el => el.remove());
            
            players.forEach((player, index) => {
                if (player.bankrupt) return;
                
                const cell = document.getElementById(`cell${player.position}`);
                if (cell) {
                    const marker = document.createElement('div');
                    marker.className = 'player-marker';
                    marker.style.background = player.color;
                    marker.textContent = player.emoji;
                    
                    // 多玩家分散排列
                    const activePlayers = players.filter(p => !p.bankrupt && p.position === player.position).length;
                    const cellSize = cell.offsetWidth;
                    const markerSize = 30;
                    const padding = 5;
                    
                    if (activePlayers === 1) {
                        marker.style.left = `${(cellSize - markerSize) / 2}px`;
                        marker.style.bottom = `${padding}px`;
                    } else {
                        const positions = [
                            { left: padding, bottom: padding },
                            { left: cellSize - markerSize - padding, bottom: padding },
                            { left: padding, bottom: cellSize - markerSize - padding },
                            { left: cellSize - markerSize - padding, bottom: cellSize - markerSize - padding }
                        ];
                        const pos = positions[index % positions.length];
                        marker.style.left = `${pos.left}px`;
                        marker.style.bottom = `${pos.bottom}px`;
                    }
                    
                    marker.title = player.name;
                    cell.appendChild(marker);
                }
            });
        }

        function rollDice() {
            const dice1 = Math.floor(Math.random() * 6) + 1;
            const dice2 = Math.floor(Math.random() * 6) + 1;
            const total = dice1 + dice2;
            const symbols = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            document.getElementById('diceDisplay').textContent = `${symbols[dice1-1]} ${symbols[dice2-1]}`;
            addMessage(`🎲 ${players[currentPlayerIndex].name} 掷出 ${dice1} + ${dice2} = ${total}`);
            movePlayer(total);
            document.getElementById('rollBtn').disabled = true;
        }

        function movePlayer(steps) {
            const player = players[currentPlayerIndex];
            const oldPos = player.position;
            player.position = (player.position + steps) % BOARD_SIZE;
            if (player.position < oldPos) {
                player.money += 2000;
                addMessage(`✅ 经过起点，获得 2000 元！`);
            }
            updatePlayerMarkers();
            updatePlayerDisplay();
            setTimeout(checkPosition, 500);
        }

        function checkPosition() {
            const player = players[currentPlayerIndex];
            const pos = player.position;
            
            if (pos === 0) {
                addMessage(`📍 起点`);
            } else if (PROPERTIES[pos]) {
                const prop = PROPERTIES[pos];
                if (!(pos in boardOwners)) {
                    addMessage(`🏠 ${prop.name} - 可购买（${prop.price}元）`);
                    if (player.money >= prop.price) {
                        document.getElementById('buyBtn').style.display = 'inline-block';
                    }
                } else if (boardOwners[pos] === currentPlayerIndex) {
                    addMessage(`✅ 这是你的地产`);
                } else {
                    const rent = prop.rent;
                    addMessage(`💸 踩到${players[boardOwners[pos]].name}的${prop.name}，需付租金${rent}元`);
                    if (player.money >= rent) {
                        player.money -= rent;
                        players[boardOwners[pos]].money += rent;
                        addMessage(`💰 支付租金${rent}元给${players[boardOwners[pos]].name}`);
                    } else {
                        player.bankrupt = true;
                        addMessage(`💀 ${player.name}破产了！`);
                        checkGameOver();
                    }
                }
            } else if ([2, 17].includes(pos)) {
                drawCard('机会');
            } else if ([7, 12].includes(pos)) {
                drawCard('命运');
            }
            
            updatePlayerDisplay();
            document.getElementById('endBtn').style.display = 'inline-block';
        }

        function drawCard(type) {
            const cards = [
                { text: "恭喜发财！获得奖金 2000 元", money: 2000 },
                { text: "投资收益！获得奖金 1500 元", money: 1500 },
                { text: "医疗费用！支付 1000 元", money: -1000 },
                { text: "交通罚款！支付 500 元", money: -500 }
            ];
            const card = cards[Math.floor(Math.random() * cards.length)];
            const player = players[currentPlayerIndex];
            addMessage(`🎴 ${type}：${card.text}`);
            player.money += card.money;
            if (player.money < 0) {
                player.bankrupt = true;
                addMessage(`💀 ${player.name}破产了！`);
                checkGameOver();
            }
            updatePlayerDisplay();
            document.getElementById('endBtn').style.display = 'inline-block';
        }

        function buyProperty() {
            const player = players[currentPlayerIndex];
            const pos = player.position;
            if (PROPERTIES[pos] && !(pos in boardOwners)) {
                const prop = PROPERTIES[pos];
                if (player.money >= prop.price) {
                    player.money -= prop.price;
                    player.properties.push(pos);
                    boardOwners[pos] = currentPlayerIndex;
                    addMessage(`✅ 购买了${prop.name}（${prop.price}元）`);
                    document.getElementById('buyBtn').style.display = 'none';
                    updatePlayerDisplay();
                    updatePlayerMarkers();
                }
            }
        }

        function endTurn() {
            document.getElementById('buyBtn').style.display = 'none';
            document.getElementById('endBtn').style.display = 'none';
            document.getElementById('rollBtn').disabled = false;
            do {
                currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
            } while (players[currentPlayerIndex].bankrupt);
            updatePlayerDisplay();
            addMessage(`\n🎯 轮到${players[currentPlayerIndex].name}`);
        }

        function updatePlayerDisplay() {
            const player = players[currentPlayerIndex];
            document.getElementById('currentPlayerName').textContent = `${player.emoji} ${player.name}`;
            document.getElementById('currentPlayerName').style.color = player.color;
            document.getElementById('currentMoney').textContent = player.money;
            const names = ['起点','北京路','机会','上海街','广州大道','深圳路','武汉大道','命运','杭州街','成都路','监狱','南京路','命运','西安街','重庆路','免费停车','天津大道','机会','苏州街'];
            document.getElementById('currentPosition').textContent = names[player.position] || `位置${player.position}`;
            document.getElementById('currentProperties').textContent = player.properties.length;
        }

        function addMessage(text) {
            const log = document.getElementById('messageLog');
            const p = document.createElement('p');
            p.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            log.appendChild(p);
            log.scrollTop = log.scrollHeight;
        }

        function checkGameOver() {
            const activePlayers = players.filter(p => !p.bankrupt);
            if (activePlayers.length === 1) {
                gameOver = true;
                addMessage(`\n🎉🎉🎉 ${activePlayers[0].name}获胜！🎉🎉🎉`);
                setTimeout(() => alert(`🎉 恭喜${activePlayers[0].name}获胜！`), 100);
            }
        }

        // 窗口大小变化时重新计算玩家标记位置
        window.addEventListener('resize', () => {
            updatePlayerMarkers();
        });
    </script>
</body>
</html>
